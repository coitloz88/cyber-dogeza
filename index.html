<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>사이버 불판 도게자 — 긴급 사죄 방송</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&family=DotGothic16&family=Noto+Serif+KR:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/main.css" />
  </head>
  <body>
    <!-- 흔들리는 씬 (버튼만 바깥) -->
    <div class="scene" id="scene">
      <div class="grid"></div>
      <div class="glow"></div>
      <div class="flames" id="flames"></div>
      <div class="grill"></div>

      <!-- 도게자 인물 -->
      <div class="figure-wrap" id="figure">
        <div class="dogeza" id="dogeza">🙇</div>
        <div class="sweat">💦</div>
        <div class="impact-lines">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div class="stage">
        <div class="badge">⚠ EMERGENCY BROADCAST · 緊急謝罪 ⚠</div>
        <h1>사이버<span class="stamp">불판</span>도게자</h1>
        <div class="subtitle">
          [ 진심사죄 모드 가동중<span class="blink">_</span> ]
        </div>
      </div>
    </div>
    <!-- /.scene -->

    <!-- UI HUD (씬 바깥 — 비네팅/스캔라인 위에 떠있음, 안 흔들림) -->
    <!-- 죄목 (데스크탑 우측, 모바일 숨김) -->
    <div class="culprits">
      <div class="label">사건 경위 / EVIDENCE</div>
      AI 에이전트로 PR 양산<br />
      <span class="name">Jules</span> · <span class="name">Codex</span> ·
      <span class="name">Claude</span><br />
      레포지토리 오염<br />
      <span class="strike">변명의 여지 없음</span>
    </div>

    <!-- 영수증 (데스크탑 좌측, 모바일 상단 스트립) -->
    <div class="receipt">
      <div class="label">// SAJOE.RECEIPT</div>
      <div class="row mobile-hide">
        <span>피해자</span><span class="v">선생님</span>
      </div>
      <div class="row mobile-hide">
        <span>가해자</span><span class="v">나</span>
      </div>
      <div class="row mobile-hide">
        <span>온도</span><span class="v" id="temperature">1200°C</span>
      </div>
      <div class="row mobile-hide">
        <span>상태</span><span class="v">정좌중</span>
      </div>
      <div class="row divider">
        <span>절한 횟수</span
        ><span class="v"><span id="count">1</span> 회</span>
      </div>
      <div class="row">
        <span>체류시간</span><span class="v" id="timer">0:00</span>
      </div>
    </div>

    <!-- 하단 패널 (씬 바깥 — 절해도 안 움직임) -->
    <div class="panel">
      <button class="bow-btn" id="bowBtn">한 번 더 사죄</button>
    </div>

    <!-- 108배 해탈 메시지 -->
    <div class="liberation-msg" id="liberationMsg">
      <div class="big">解 脱</div>
      <div class="sub">108배 완료 · 사죄가 받아들여졌습니다</div>
      <div class="english">LIBERATION ACHIEVED</div>
    </div>

    <script type="module">
      import { initPhase1 } from "./components/phase1.js";
      initPhase1();
    </script>
  </body>
</html>
